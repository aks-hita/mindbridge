{% extends 'base.html' %}
{% block title %}Book Appointment{% endblock %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:3rem 2rem;background:linear-gradient(135deg,var(--cream) 0%,var(--warm-white) 100%);">
  <div class="form-container fade-up" style="max-width:580px;">
    <div style="text-align:center;margin-bottom:1rem;font-size:2.5rem;">📅</div>
    <h2>Book a Session</h2>
    <p class="sub">Select your counsellor and preferred time</p>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Choose Counsellor</label>
        <select name="counsellor" required>
          <option value="">-- Select a Counsellor --</option>
          {% for c in counsellors %}
          <option value="{{ c.counsellor_id }}">Dr. {{ c.name }} — {{ c.specialization }} ({{ c.experience_years }}y exp)</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date</label>
          <input type="date" name="app_date" required min="{% now 'Y-m-d' %}">
        </div>
        <div class="form-group">
          <label>Time</label>
          <input type="time" name="app_time" required>
        </div>
      </div>
      <div class="form-group">
        <label>Session Mode</label>
        <select name="mode">
          <option value="online">🌐 Online (Video Call)</option>
          <option value="offline">🏥 In-Person</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Confirm Booking →</button>
    </form>
    <div class="form-footer" style="margin-top:1rem;">
      <a href="/dashboard/">← Back to Dashboard</a>
    </div>
  </div>
</div>
{% endblock %}
