{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:linear-gradient(135deg,var(--cream) 0%,var(--warm-white) 100%);">
  <div class="form-container fade-up">
    <div style="text-align:center;margin-bottom:1.5rem;font-size:2.5rem;">🌿</div>
    <h2>Welcome back</h2>
    <p class="sub">Sign in to continue your wellness journey</p>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="your_username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In →</button>
    </form>
    <div class="form-footer" style="margin-top:1.5rem;">
      Don't have an account? <a href="/register/">Create one</a>
    </div>
  </div>
</div>
{% endblock %}
